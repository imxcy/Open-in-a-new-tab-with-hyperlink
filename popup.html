<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 200px;
      font-family: "Microsoft YaHei", system-ui, sans-serif;
      padding: 16px;
      text-align: center;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #333;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 28px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 28px;
      transition: 0.3s;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 22px; width: 22px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #4285f4; }
    input:checked + .slider:before { transform: translateX(24px); }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="title">超链新标签页打开</div>
  <label class="switch">
    <input type="checkbox" id="toggle">
    <span class="slider"></span>
  </label>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
